<!DOCTYPE html>
<html>
<head>
    <title>Student Info Fetch</title>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
        }
        .student {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h2>Student Information</h2>
    <button onclick="loadStudents()">Load Students</button>

    <div id="output"></div>

<script>
function loadStudents() {
    var xhr = new XMLHttpRequest();

    xhr.open("GET", "students.php", true);

    xhr.onload = function() {
        if (this.status === 200) {

            // Convert JSON string to JS object
            var students = JSON.parse(this.responseText);

            var output = "";

            // Loop through students
            for (var i = 0; i < students.length; i++) {
                output += `
                    <div class="student">
                        <strong>Name:</strong> ${students[i].name} <br>
                        <strong>ID:</strong> ${students[i].id} <br>
                        <strong>Department:</strong> ${students[i].department} <br>
                        <strong>CGPA:</strong> ${students[i].cgpa}
                    </div>
                `;
            }

            document.getElementById("output").innerHTML = output;
        }
    };

    xhr.send();
}
</script>

</body>
</html>
